<header class="navbar">
    <div class="navbar-left">
        <button type="button" class="menu-btn" (click)="openSidebar()">
            <i class="fas fa-bars"></i>
        </button>

        <div class="mobile-logo">
            <img src="assets/logo.png" alt="Money Pilot">
        </div>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search transactions, budgets...">
        </div>
    </div>

    <div class="navbar-right">
        <button type="button" class="icon-btn">
            <i class="fas fa-moon"></i>
        </button>

        <button type="button" class="icon-btn notification-btn">
            <i class="fas fa-bell"></i>
            <span class="badge">3</span>
        </button>

        <div class="profile-container">
            <div class="profile" (click)="toggleDropdown()">
                <img [src]="user?.profileImage || 'assets/default-user.png'" alt="Profile">

                <div class="profile-info">
                    <h4>{{ user?.firstName }} {{ user?.lastName }}</h4>
                    <span>{{ user?.role === 'ADMIN' ? 'Administrator' : 'Member' }}</span>
                </div>

                <i class="fas" [ngClass]="isDropdownOpen ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
            </div>

            <div class="profile-dropdown" *ngIf="isDropdownOpen">
                <div class="dropdown-header">
                    <img [src]="user?.profileImage || 'assets/default-user.png'" alt="Profile">

                    <div>
                        <h4>{{ user?.firstName }} {{ user?.lastName }}</h4>
                        <span>{{ user?.email }}</span>
                    </div>
                </div>

                <hr>

                <a routerLink="/profile" (click)="closeDropdown()">
                    <i class="fas fa-user"></i>
                    My Profile
                </a>

                <a routerLink="/settings" (click)="closeDropdown()">
                    <i class="fas fa-cog"></i>
                    Settings
                </a>

                <button type="button" (click)="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </button>
            </div>
        </div>
    </div>
</header>
