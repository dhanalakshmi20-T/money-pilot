<div class="profile-page">
    <div class="page-header">
        <h2>My Profile</h2>
        <p>Manage your personal information</p>
    </div>

    <div class="loading" *ngIf="loading">Loading profile...</div>

    <div class="profile-card" *ngIf="!loading">
        <div class="profile-left">
            <div class="avatar">
                <img [src]="profile?.profileImage || 'assets/default-user.png'" alt="Profile">
            </div>

            <button class="upload-btn" type="button">Change Photo</button>

            <div class="account-info">
                <h3>{{ profile?.firstName }} {{ profile?.lastName }}</h3>
                <p>{{ profile?.email }}</p>
                <span class="role">{{ profile?.role }}</span>
            </div>
        </div>

        <div class="profile-right">
            <form [formGroup]="profileForm" (ngSubmit)="updateProfile()">
                <div class="form-grid">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" formControlName="firstName">
                    </div>

                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" formControlName="lastName">
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" formControlName="email">
                    </div>

                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" formControlName="phone">
                    </div>
                </div>

                <div class="account-details">
                    <div>
                        <label>Role</label>
                        <p>{{ profile?.role }}</p>
                    </div>

                    <div>
                        <label>Member Since</label>
                        <p>{{ profile?.createdAt | date }}</p>
                    </div>
                </div>

                <div class="bottom-group">
                    <button type="submit" class="save-btn" [disabled]="saving">{{ saving ? 'Saving...' : 'Save Changes' }}</button>
                    <button type="reset" class="cancel-btn" (click)="loadProfile()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>
